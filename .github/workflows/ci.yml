name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    name: Node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4

      - name: Install libshout
        run: sudo apt-get update && sudo apt-get install -y libshout3

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - run: yarn typecheck
      - run: yarn test
      - run: yarn build
