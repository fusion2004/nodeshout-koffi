[tools]
node = "22"
yarn = "4.14.1"

[tasks.build]
run = "yarn build"

[tasks."lint:tsc"]
run = "yarn lint:tsc"

[tasks."lint:oxlint"]
run = "yarn lint:oxlint"

[tasks."lint:oxfmt"]
run = "yarn lint:oxfmt"

[tasks.lint]
depends = ["lint:tsc", "lint:oxlint", "lint:oxfmt"]

[tasks.demos]
run = "yarn demos"

[tasks.test]
run = "yarn test"

# Tag the current commit with v<version> (from package.json) and push the tag
# to origin. Intended workflow: merge a PR that bumps the package.json version
# into main, run the Release workflow on GitHub Actions to publish to npm, then
# run this task on latest main to record the released commit as v<version>.
[tasks.release]
description = "Tag the current commit with v<package.json version> and push to origin"
run = '''
set -euo pipefail
version=$(node -p 'require("./package.json").version')
tag="v$version"
git tag -a "$tag" -m "Release $tag"
git push origin "$tag"
echo "Pushed $tag"
'''
